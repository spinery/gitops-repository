# Repositorio Helm para OpenTelemetry (opentelemetry-operator).
# Sin autenticación (repositorio público).
# Aplicar antes que la Application del operator si Argo CD no resuelve el chart:
#   kubectl apply -n argocd -f argocd-config/repositories/repository-helm-opentelemetry.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: repo-helm-opentelemetry
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: helm
  name: opentelemetry
  url: https://open-telemetry.github.io/opentelemetry-helm-charts
