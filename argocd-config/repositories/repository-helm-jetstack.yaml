# Repositorio Helm para cert-manager (Jetstack).
# Sin autenticación (repositorio público).
# Aplicar antes que la Application de cert-manager si Argo CD no resuelve el chart:
#   kubectl apply -n argocd -f argocd-config/repositories/repository-helm-jetstack.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: repo-helm-jetstack
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: helm
  name: jetstack
  url: https://charts.jetstack.io
