# Argo CD Application para el Flink Kubernetes Operator (Helm).
# El chart se obtiene vía dependencia; los values están en flink-operator/values.yaml.
#
# Requisito: el repositorio Git debe estar registrado en Argo CD.
# Para resolver la dependencia Helm, registrar el repo (repositories/repository-helm-flink.yaml).
# Aplicar: kubectl apply -n argocd -f argocd-config/applications/application-flink-operator.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flink-kubernetes-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: "https://github.com/spinery/gitops-repository.git"
    targetRevision: "HEAD"
    path: "argocd-config/applications/flink-operator"

    helm:
      releaseName: flink-kubernetes-operator
      # values se toman de flink-operator/values.yaml en el path anterior

  destination:
    server: "https://kubernetes.default.svc"
    namespace: flink-operator

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
