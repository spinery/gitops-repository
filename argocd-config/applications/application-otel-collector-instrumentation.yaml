# Argo CD Application para OpenTelemetry Collector e Instrumentation (manifiestos planos).
# Los manifiestos se encuentran en otel-collector-instrumentation/ (OpenTelemetryCollector, Instrumentation, etc.).
#
# Requisito: OpenTelemetry Operator instalado (application-opentelemetry-operator.yaml).
# Requisito: el repositorio Git debe estar registrado en Argo CD.
# Aplicar: kubectl apply -n argocd -f argocd-config/applications/application-otel-collector-instrumentation.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector-instrumentation
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: "https://github.com/spinery/gitops-repository.git"
    targetRevision: "HEAD"
    path: "argocd-config/applications/otel-collector-instrumentation"

  destination:
    server: "https://kubernetes.default.svc"
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
