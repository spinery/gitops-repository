# Rollout Canary de ejemplo con argoproj/rollouts-demo.
#
# Cómo probar el canary:
# 1. Desplegar: aplicar este manifiesto (versión estable = blue).
# 2. Cambiar la imagen a un nuevo color, ej: argoproj/rollouts-demo:yellow
# 3. Sincronizar (Argo CD o kubectl apply) para que el Rollout detecte el cambio.
# 4. El canary avanzará por los pasos: 20% -> pausa 30s -> 50% -> pausa 30s -> 100%.
# 5. Si usas "pause indefinitely" (pause: {}), promover manualmente:
#    kubectl argo rollouts promote nginx-rollout -n <namespace>
#
# Documentación: https://argo-rollouts.readthedocs.io/en/stable/features/canary/
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nginx-rollout
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx-rollout
  template:
    metadata:
      labels:
        app: nginx-rollout
    spec:
      containers:
        - name: rollouts-demo
          image: argoproj/rollouts-demo:blue
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
  minReadySeconds: 10
  revisionHistoryLimit: 3
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause:
            duration: 120s
        - setWeight: 100
        - pause: {}

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-rollout
  labels:
    app: nginx-rollout
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: nginx-rollout
